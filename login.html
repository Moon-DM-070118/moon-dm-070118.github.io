<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 注册 · 异想纪元</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0c0f, #151a1f);
            color: #e0e4e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .container {
            background: rgba(21, 26, 31, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #3ecfcf;
            border-radius: 0;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #3ecfcf;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #3ecfcf;
            color: #3ecfcf;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: #3ecfcf;
            color: #0a0c0f;
        }
        .tab-content {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .tab-content.active {
            display: flex;
        }
        input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #a0a8b0;
            color: white;
            padding: 0.8rem;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: transparent;
            border: 1px solid #3ecfcf;
            color: #3ecfcf;
            padding: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }
        button.primary {
            background: #3ecfcf;
            color: #0a0c0f;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #ff4d6d;
        }
        .link {
            text-align: center;
            margin-top: 1rem;
        }
        a {
            color: #9b4dff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>异想纪元 · 熵寂录</h2>
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div class="tab-content active" id="tabLogin">
            <input type="text" id="loginUsername" placeholder="用户名">
            <input type="password" id="loginPassword" placeholder="密码">
            <button id="loginBtn" class="primary">登录</button>
            <div class="message" id="loginMsg"></div>
        </div>

        <!-- 注册表单 -->
        <div class="tab-content" id="tabRegister">
            <input type="text" id="regUsername" placeholder="用户名">
            <input type="password" id="regPassword" placeholder="密码">
            <input type="text" id="regGameId" placeholder="游戏内ID（选填）">
            <button id="registerBtn" class="primary">注册</button>
            <div class="message" id="regMsg"></div>
        </div>

        <div class="link">
            <a href="index.html">← 返回官网首页</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://MoonDM.pythonanywhere.com';

        // 切换选项卡
        const tabs = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`tab${target.charAt(0).toUpperCase() + target.slice(1)}`).classList.add('active');
            });
        });

        // 登录
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMsg');
            if (!username || !password) {
                msgDiv.textContent = '请填写用户名和密码';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    msgDiv.textContent = '登录成功！正在跳转...';
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } else {
                    msgDiv.textContent = data.error || '登录失败';
                }
            } catch (err) {
                msgDiv.textContent = '网络错误，请检查后端是否启动';
            }
        });

        // 注册
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const game_id = document.getElementById('regGameId').value;
            const msgDiv = document.getElementById('regMsg');
            if (!username || !password) {
                msgDiv.textContent = '请填写用户名和密码';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, game_id })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    msgDiv.textContent = '注册成功！正在跳转...';
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } else {
                    msgDiv.textContent = data.error || '注册失败';
                }
            } catch (err) {
                msgDiv.textContent = '网络错误，请检查后端是否启动';
            }
        });
    </script>
</body>
</html>
